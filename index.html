
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patinhas Felizes</title>

<style>
    body{
        margin:0;
        font-family:Arial, sans-serif;
        background:#f8f8f8;
    }

    header{
        background:#ff914d;
        color:white;
        text-align:center;
        padding:40px;
    }

    .pets{
        display:flex;
        justify-content:center;
        flex-wrap:wrap;
        gap:20px;
        padding:30px;
    }

    .card{
        background:white;
        width:250px;
        border-radius:15px;
        overflow:hidden;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
        text-align:center;
    }

    .card img{
        width:100%;
        height:200px;
        object-fit:cover;
    }

    .card h2{
        margin:10px 0;
    }

    .preco{
        color:#ff914d;
        font-size:22px;
        font-weight:bold;
    }

    button{
        background:#ff914d;
        color:white;
        border:none;
        padding:10px 20px;
        margin:15px;
        border-radius:8px;
        cursor:pointer;
    }
</style>
</head>

<body>

<header>
    <h1>🐾 Patinhas Felizes</h1>
    <p>Encontre seu novo melhor amigo!</p>
</header>

<section class="pets">

    <div class="card">
        <img src="https://placedog.net/400/300" alt="Cachorro">
        <h2>Thor</h2>
        <p>Golden Retriever</p>
        <p class="preco">R$ 800</p>
        <button>Adotar</button>
    </div>

    <div class="card">
        <img src="https://placekitten.com/400/300" alt="Gato">
        <h2>Luna</h2>
        <p>Gata Persa</p>
        <p class="preco">R$ 500</p>
        <button>Adotar</button>
    </div>

</section>

</body>
</html>,
